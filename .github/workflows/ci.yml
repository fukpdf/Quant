name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ---------------------------------------------------------------------------
  # Typecheck — full TypeScript strict-mode compilation across all packages
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm run typecheck

  # ---------------------------------------------------------------------------
  # Build — verify esbuild bundle compiles cleanly
  # ---------------------------------------------------------------------------
  build:
    name: Build API Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

  # ---------------------------------------------------------------------------
  # OpenAPI Validation — verify spec is well-formed
  # ---------------------------------------------------------------------------
  openapi-validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenAPI spec
        run: |
          node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const spec = yaml.load(fs.readFileSync('lib/api-spec/openapi.yaml', 'utf8'));
            if (!spec.openapi || !spec.info || !spec.paths) {
              console.error('OpenAPI spec missing required fields');
              process.exit(1);
            }
            console.log('OpenAPI spec valid — version:', spec.info.version, '— paths:', Object.keys(spec.paths).length);
          " || (pnpm add -g js-yaml && node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const spec = yaml.load(fs.readFileSync('lib/api-spec/openapi.yaml', 'utf8'));
            console.log('OpenAPI spec valid — version:', spec.info.version, '— paths:', Object.keys(spec.paths).length);
          ")

  # ---------------------------------------------------------------------------
  # Security — dependency vulnerability audit
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -r --include="*.ts" --include="*.js" -E "(password|secret|api_key|apikey)\s*=\s*['\"][^'\"]{8,}['\"]" \
            artifacts/api-server/src lib/db/src artifacts/dashboard/src \
            --exclude-dir=node_modules --exclude-dir=dist 2>/dev/null | \
            grep -v "process.env" | grep -v "placeholder" | grep -v ".example" | \
            grep -v "test\|mock\|fake\|dummy"; then
            echo "WARNING: Potential hardcoded secrets found above"
          else
            echo "No hardcoded secrets detected"
          fi

  # ---------------------------------------------------------------------------
  # Lint — formatting check via prettier
  # ---------------------------------------------------------------------------
  lint:
    name: Lint / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm prettier --check "artifacts/**/*.{ts,tsx}" "lib/**/*.ts" || echo "Formatting issues found (non-blocking)"
        continue-on-error: true
