        startEquity:
          type: string
        endEquity:
          type: string
        peakEquity:
          type: string
        maxDrawdownPct:
          type: string
        generatedAt:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/EquityCurvePoint"
          description: Present when format=expanded (default)
        curveData:
          type: array
          items:
            type: object
          description: Present when format=compact (raw compact points)
      required: [id, totalPoints, startEquity, endEquity, peakEquity, maxDrawdownPct, generatedAt]

    # -------------------------------------------------------------------------
    # Phase 4 — Validation
    # -------------------------------------------------------------------------
    ValidationRequest:
      type: object
      properties:
        backtestRunId:
          type: string
          format: uuid
        walkForwardRunId:
          type: string
          format: uuid
        minTradesThreshold:
