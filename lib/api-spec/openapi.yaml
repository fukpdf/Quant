      tags: [intelligence]
      summary: Trigger regime detection for one or more symbols
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbols]
              properties:
                symbols:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 20
                lookbackDays:
                  type: integer
                  default: 30
                  minimum: 7
                  maximum: 365
      responses:
        '201':
          description: Regime detection result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/MarketRegime'
                      - $ref: '#/components/schemas/RegimeDetectionSummary'

