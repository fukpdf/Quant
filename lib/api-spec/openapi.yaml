openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.15.0
  description: QuantForge API — multi-market data platform with paper trading, institutional risk engine, portfolio analytics, AI research assistant, real-time market streaming, multi-agent intelligence layer, observability & operations platform, and multi-tenant authentication & RBAC
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: markets
    description: Market instruments catalog
  - name: candles
    description: OHLCV candle data
  - name: providers
    description: Market data providers and health monitoring
  - name: market-registry
    description: Extended market registry with provider info
  - name: data-quality
    description: Data quality validation results
  - name: ingestion
    description: Ingestion jobs and status
  - name: economic-events
    description: Economic calendar events
  - name: news
    description: Financial news items
  - name: research
    description: Quantitative research laboratory — strategy definitions, backtesting, and performance analysis
  - name: paper
    description: Paper trading — virtual accounts, simulated orders, position tracking, and performance analytics
  - name: risk
    description: Risk engine — pre-trade capital protection, drawdown monitoring, circuit breakers, kill switch, and audit log
  - name: portfolio
    description: Portfolio intelligence — performance analytics, health scoring, attribution, benchmarks, diversification, recommendations
  - name: ai
    description: AI Research Assistant — advisory-only analytical intelligence. Explains portfolio performance, risk events, strategies, generates reports, and answers questions. AI cannot execute trades, approve orders, or override risk controls.
  - name: streams
    description: Real-time market streaming — WebSocket provider management, live tick/orderbook/trade data, market state engine, event bus, gap recovery, latency metrics, and tick replay engine.
  - name: intelligence
    description: Multi-Agent Intelligence & Autonomous Strategy Factory — regime detection, parameter optimization (grid/random/Bayesian/genetic), strategy evolution, portfolio allocation, multi-factor rankings, strategy clustering, AI research jobs, and continuous learning. ADVISORY ONLY — no trades, orders, or positions are affected by this layer.
  - name: operations
    description: Observability, Monitoring & Operations Platform — real-time system metrics, per-service health checks, scheduler tracking, alert rules and events, incident management, uptime history, performance snapshots, and monitoring audit log. READ-ONLY platform intelligence — no trades, orders, or positions are affected.
  - name: auth
    description: Authentication — register, login, logout, token refresh, email verification, password management, session management, and API key management.
  - name: users
    description: User administration — list users, get user details, update profiles, deactivate accounts. Requires users:read or users:write permission.
  - name: organizations
    description: Multi-tenant organizations — create, get, update organizations and manage team membership.
  - name: rbac
    description: Role-based access control — system roles, permissions catalog, user-role assignments, effective-permission resolution.
  - name: security
    description: Security event log and audit trail — login attempts, suspicious activity, admin actions, and resource-level audit entries.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List market instruments
      description: Returns all market instruments, optionally filtered
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [crypto, forex, stock, index, commodity]
        - name: active
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Market list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/candles:
    get:
      operationId: getCandles
      tags: [candles]
      summary: Get OHLCV candles
      description: Returns candle data for a symbol and interval
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Candle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/latest-price:
    get:
      operationId: getLatestPrice
      tags: [candles]
      summary: Get latest price for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestPriceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/ingestion/status:
    get:
      operationId: getIngestionStatus
      tags: [ingestion]
      summary: Get recent ingestion log entries (Phase 1 legacy)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ingestion log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionStatusResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/ingestion/jobs:
    get:
      operationId: listIngestionJobs
      tags: [ingestion]
      summary: List ingestion jobs
      description: Returns structured ingestion job records with start/end times and detailed status
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, success, failed, partial]
        - name: jobType
          in: query
          schema:
            type: string
            enum: [candle_backfill, candle_incremental, quality_check, provider_health]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ingestion jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all market data providers
      description: Returns all registered providers with their current status and capabilities
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, degraded, error]
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/providers/health:
    get:
      operationId: getProvidersHealth
      tags: [providers]
      summary: Get provider health records
      description: Returns time-series health check records for providers
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Provider health records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderHealthListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/market-registry:
    get:
      operationId: getMarketRegistry
      tags: [market-registry]
      summary: Full market registry with provider info
      description: Returns markets with enriched provider information and metadata
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [crypto, forex, stock, index, commodity]
        - name: active
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: provider
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Market registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketRegistryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/data-quality:
    get:
      operationId: getDataQuality
      tags: [data-quality]
      summary: Get data quality check results
      description: Returns results of automated data quality validation runs
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
        - name: checkType
          in: query
          schema:
            type: string
            enum:
              - missing_candles
              - timestamp_gaps
              - duplicate_candles
              - outlier_prices
              - invalid_volumes
              - future_timestamps
              - ohlc_consistency
        - name: status
          in: query
          schema:
            type: string
            enum: [pass, fail, warning]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Data quality results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataQualityListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/economic-events:
    get:
      operationId: listEconomicEvents
      tags: [economic-events]
      summary: List economic calendar events
      description: Returns economic calendar events, filterable by country, impact, and date range
      parameters:
        - name: country
          in: query
          schema:
            type: string
        - name: impact
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Economic events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomicEventListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/news:
    get:
      operationId: listNews
      tags: [news]
      summary: List financial news items
      description: Returns news items, filterable by source, category, and date range
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: News items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Research Laboratory (Phase 3)
  # ---------------------------------------------------------------------------

  /v1/research/strategies:
    get:
      operationId: listResearchStrategies
      tags: [research]
      summary: List available research strategies
      description: Returns all registered strategies with their parameter schemas
      responses:
        "200":
          description: Strategy list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchStrategyListResponse"

  /v1/research/backtest:
    post:
      operationId: runBacktest
      tags: [research]
      summary: Run a backtest
      description: Executes a historical backtest for the given strategy, symbol, interval, and date range
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: Backtest completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Backtest failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobResult"

  /v1/research/backtest/{id}:
    get:
      operationId: getBacktestResult
      tags: [research]
      summary: Get backtest run with results
      description: Returns the backtest run record, performance metrics, and all simulated trades
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Backtest run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/research/runs:
    get:
      operationId: listResearchRuns
      tags: [research]
      summary: List backtest runs
      description: Returns backtest runs with optional filtering
      parameters:
        - name: strategyName
          in: query
          schema:
            type: string
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Backtest run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/research/results:
    get:
      operationId: listResearchResults
      tags: [research]
      summary: List research results
      description: Returns performance metrics for completed backtest runs
      parameters:
        - name: strategyName
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResultListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/research/compare:
    get:
      operationId: compareBacktestRuns
      tags: [research]
      summary: Compare multiple backtest runs
      description: Side-by-side performance comparison of two or more backtest runs
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of backtest run IDs (minimum 2)
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComparisonResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Portfolio Backtesting
  # ---------------------------------------------------------------------------
  /v1/research/portfolio-backtest:
    post:
      operationId: runPortfolioBacktest
      tags: [research]
      summary: Run a portfolio backtest
      description: Run a strategy across multiple symbols simultaneously with portfolio-level tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioBacktestRequest"
      responses:
        "200":
          description: Portfolio backtest completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBacktestJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Portfolio backtest failed

  /v1/research/portfolio-backtest/{id}:
    get:
      operationId: getPortfolioBacktest
      tags: [research]
      summary: Get portfolio backtest result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Portfolio backtest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBacktestDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Walk-Forward Testing
  # ---------------------------------------------------------------------------
  /v1/research/walk-forward:
    post:
      operationId: runWalkForward
      tags: [research]
      summary: Run a walk-forward validation test
      description: Splits the historical window into IS/OOS sub-periods and tests consistency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkForwardRequest"
      responses:
        "200":
          description: Walk-forward test completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkForwardJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Walk-forward test failed

  /v1/research/walk-forward/{id}:
    get:
      operationId: getWalkForwardRun
      tags: [research]
      summary: Get walk-forward run result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Walk-forward run detail with all window results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkForwardDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Monte Carlo Simulation
  # ---------------------------------------------------------------------------
  /v1/research/monte-carlo:
    post:
      operationId: runMonteCarlo
      tags: [research]
      summary: Run a Monte Carlo simulation
      description: Shuffles trade sequence N times to estimate return distribution and probability of ruin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloRequest"
      responses:
        "200":
          description: Monte Carlo simulation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Simulation failed

  /v1/research/monte-carlo/{id}:
    get:
      operationId: getMonteCarloRun
      tags: [research]
      summary: Get Monte Carlo simulation result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Monte Carlo run detail with percentiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Equity Curves
  # ---------------------------------------------------------------------------
  /v1/research/equity-curve/{id}:
    get:
      operationId: getEquityCurve
      tags: [research]
      summary: Get equity curve for a backtest or portfolio run
      description: |
        Returns expanded equity curve points for a run.
        Pass `?type=portfolio` query param (not in spec) to look up a portfolio backtest.
        Pass `?format=compact` query param (not in spec) for raw compact JSON.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Equity curve data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquityCurveResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Validation
  # ---------------------------------------------------------------------------
  /v1/research/validation:
    post:
      operationId: generateValidation
      tags: [research]
      summary: Generate a strategy validation report
      description: Analyses a completed backtest for overfitting, sample size, drawdown, and other red flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationRequest"
      responses:
        "200":
          description: Validation report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/research/validation/{id}:
    get:
      operationId: getValidationResult
      tags: [research]
      summary: Get validation result for a run
      description: Retrieves the most recent validation report for a backtest or walk-forward run ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Backtest run ID or walk-forward run ID
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Rankings
  # ---------------------------------------------------------------------------
  /v1/research/rankings:
    get:
      operationId: getResearchRankings
      tags: [research]
      summary: Get strategy performance rankings
      description: Returns completed backtest runs ranked by Sharpe Ratio (desc), then Total Return
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ranked research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Phase 5 — Paper Trading
  # ---------------------------------------------------------------------------

  /v1/paper/accounts:
    post:
      operationId: createPaperAccount
      tags: [paper]
      summary: Create a virtual paper trading account
      description: Creates a new paper trading account with virtual capital. No real money involved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaperAccountRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listPaperAccounts
      tags: [paper]
      summary: List paper trading accounts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, closed]
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountListResponse"

  /v1/paper/accounts/{id}:
    get:
      operationId: getPaperAccount
      tags: [paper]
      summary: Get paper account with portfolio summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/assign:
    post:
      operationId: assignPaperStrategy
      tags: [paper]
      summary: Assign a strategy to a paper account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignStrategyRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/pause:
    post:
      operationId: pausePaperStrategy
      tags: [paper]
      summary: Pause an active strategy assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyStatusActionRequest"
      responses:
        "200":
          description: Assignment paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Assignment not in expected state

  /v1/paper/strategies/resume:
    post:
      operationId: resumePaperStrategy
      tags: [paper]
      summary: Resume a paused strategy assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyStatusActionRequest"
      responses:
        "200":
          description: Assignment resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/assignments:
    get:
      operationId: listPaperStrategyAssignments
      tags: [paper]
      summary: List strategy assignments
      parameters:
