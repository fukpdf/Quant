  # ---------------------------------------------------------------------------
  # Phase 9 — Real-Time Market Streaming & Event Infrastructure
  # ---------------------------------------------------------------------------

  /v1/streams/status:
    get:
      operationId: getStreamStatus
      tags: [streams]
      summary: Get current streaming infrastructure status
      description: Returns connection state, active provider, symbols, tick counts, and uptime for the live streaming pipeline.
      responses:
        "200":
          description: Stream status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StreamStatus"
                required: [data]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/providers:
    get:
      operationId: getStreamProviders
      tags: [streams]
      summary: List available streaming providers
      description: Returns the active provider and the full list of supported providers with their capabilities and requirements.
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StreamProvidersResponse"
                required: [data]

  /v1/streams/health:
    get:
      operationId: getStreamHealth
      tags: [streams]
      summary: Get stream provider health
      description: Returns composite health score, latency stats, heartbeat age, and connection status per provider.
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            enum: [mock, binance, forex, equities]
      responses:
        "200":
          description: Provider health
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/ProviderHealthStatus"
                      - type: array
                        items:
                          $ref: "#/components/schemas/ProviderHealthStatus"
                required: [data]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/sessions:
    get:
      operationId: getStreamSessions
      tags: [streams]
      summary: List stream session history
      description: Returns historical stream sessions with tick counts, status, and timing.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StreamSession"
                  total:
                    type: integer
                required: [data, total]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/failures:
    get:
      operationId: getStreamFailures
      tags: [streams]
      summary: List stream failure events
      description: Returns connection errors, heartbeat timeouts, parse errors, and other streaming failures.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Failure events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StreamFailure"
                  total:
                    type: integer
                required: [data, total]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/latency:
    get:
      operationId: getStreamLatency
      tags: [streams]
      summary: Get stream latency metrics
      description: Returns individual latency measurements or summary stats (avg/p95/p99) across provider, processing, storage, and end-to-end stages.
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: metricType
          in: query
          schema:
            type: string
            enum: [provider_latency, processing_latency, storage_latency, queue_latency, end_to_end]
        - name: summary
          in: query
          description: Return aggregate stats instead of individual measurements
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 1000
      responses:
        "200":
          description: Latency metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - type: array
                        items:
                          $ref: "#/components/schemas/LatencyMetric"
                      - type: object
                        additionalProperties:
                          $ref: "#/components/schemas/LatencyStats"
                  total:
                    type: integer
                required: [data]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/metrics:
    get:
      operationId: getStreamProcessingMetrics
      tags: [streams]
      summary: Get event processing metrics
      description: Returns aggregated throughput, latency percentiles, and error counts per event type per measurement window.
      parameters:
        - name: processor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Processing metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventProcessingMetric"
                  total:
                    type: integer
                required: [data, total]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/recovery:
    get:
      operationId: getStreamRecovery
      tags: [streams]
      summary: List stream recovery events
      description: Returns gap detection events and backfill recovery actions with success status.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Recovery events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StreamRecoveryEvent"
                  total:
                    type: integer
                required: [data, total]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/streams/audit:
    get:
      operationId: getStreamAuditLog
      tags: [streams]
      summary: Get stream audit log
      description: Immutable log of all streaming infrastructure actions — start, stop, reconnect, backfill, replay.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 1000
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StreamAuditEntry"
                  total:
                    type: integer
                required: [data, total]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/ticks:
    get:
      operationId: getTicks
      tags: [streams]
      summary: Get recent tick data for a symbol
      description: Returns the most recent tick records from the live stream. Supports time range queries for historical replay analysis.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTCUSDT
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: from
          in: query
          description: Start of time range (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of time range (ISO 8601)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Tick data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketTick"
                  symbol:
                    type: string
                  count:
                    type: integer
                required: [data, symbol, count]
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/orderbook:
    get:
      operationId: getOrderBook
      tags: [streams]
      summary: Get current order book for a symbol
      description: Returns the latest stored order book snapshot enriched with live imbalance, bid, and ask from the in-memory market state engine.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTCUSDT
      responses:
        "200":
          description: Order book
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OrderBook"
                  symbol:
                    type: string
                required: [data, symbol]
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/market-state:
    get:
      operationId: getMarketState
      tags: [streams]
      summary: Get current market state per symbol
      description: Returns live in-memory market state (price, VWAP, momentum, volatility, imbalance, ticks/sec). Falls back to DB snapshot if streaming is inactive.
      parameters:
        - name: symbol
          in: query
          description: Filter to a single symbol
          schema:
            type: string
            example: BTCUSDT
        - name: source
          in: query
          description: "live = in-memory (default); snapshot = DB snapshot"
          schema:
            type: string
            enum: [live, snapshot]
            default: live
      responses:
        "200":
          description: Market state
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/MarketState"
                      - type: array
                        items:
                          $ref: "#/components/schemas/MarketState"
                  source:
                    type: string
                    enum: [live, snapshot]
                  symbols:
                    type: array
                    items:
                      type: string
                required: [data, source]
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/replay/start:
    post:
      operationId: startReplay
      tags: [streams]
      summary: Start a tick replay session
      description: Replays stored tick data for a symbol over a time range at configurable speed. Events are fired through the internal event bus as if they were live. Max one concurrent replay.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayStartRequest"
      responses:
        "202":
          description: Replay started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReplayState"
                required: [data]
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/replay/stop:
    post:
      operationId: stopReplay
      tags: [streams]
      summary: Stop the active replay session
      responses:
        "200":
          description: Replay stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      stopped:
                        type: boolean
                      ticksReplayed:
                        type: integer
                    required: [stopped, ticksReplayed]
                required: [data]
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/replay/status:
    get:
      operationId: getReplayStatus
      tags: [streams]
      summary: Get current replay session status
      responses:
        "200":
          description: Replay status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReplayState"
                  availableSpeeds:
                    type: array
                    items:
                      type: integer
                required: [data, availableSpeeds]


  # ---------------------------------------------------------------------------
  # Phase 10 — Institutional Execution Engine
  # ---------------------------------------------------------------------------

  /v1/execution/orders:
    post:
      tags: [execution]
      summary: Submit a new order to the OMS
      description: >
        Runs the full pre-trade pipeline (schema validation → risk pre-check →
        circuit-breaker gate → route selection → fill → position update → audit).
        In simulation mode, fills are instant. In paper mode, realistic market
        state pricing is used. Live execution is permanently disabled (SAFE MODE).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order submitted and accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSubmitResponse'
        '422':
          description: Order rejected by pre-trade pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSubmitResponse'
        '400':
          description: Invalid request body
        '500':
          description: Internal error
    get:
      tags: [execution]
      summary: List execution orders
      parameters:
        - name: accountId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          description: Comma-separated statuses
          schema: { type: string }
        - name: symbol
          in: query
          schema: { type: string }
        - name: mode
          in: query
          schema: { type: string, enum: [simulation, paper, live_disabled] }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutionOrder'
                  count:
                    type: integer

  /v1/execution/orders/{id}:
    get:
      tags: [execution]
      summary: Get execution order detail with events
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order detail with full event history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/ExecutionOrder'
                      - type: object
                        properties:
                          events:
                            type: array
                            items:
                              $ref: '#/components/schemas/ExecutionOrderEvent'
        '404':
          description: Order not found

  /v1/execution/orders/{id}/cancel:
    post:
      tags: [execution]
      summary: Cancel an active order
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      orderId: { type: string, format: uuid }
                      status: { type: string }
                      cancelledBy: { type: string }
        '409':
          description: Order not in a cancellable state

  /v1/execution/fills:
    get:
      tags: [execution]
      summary: List execution fills
      parameters:
        - name: symbol
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: Fill history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutionFill'
                  count:
                    type: integer

  /v1/execution/positions:
    get:
      tags: [execution]
