                      $ref: '#/components/schemas/ExecutionSession'

  /v1/execution/metrics:
    get:
      tags: [execution]
      summary: Execution quality metrics (fill rate, latency, slippage)
      parameters:
        - name: mode
          in: query
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [1h, 4h, 1d, 7d], default: 1h }
