                  count: { type: integer }

components:
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InsufficientData:
      description: Not enough data to perform computation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # -------------------------------------------------------------------------
    # Markets
    # -------------------------------------------------------------------------
    Market:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        exchange:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, symbol, name, type, exchange, active, createdAt, updatedAt]

    MarketListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Market"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Candles
    # -------------------------------------------------------------------------
    Candle:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        timestamp:
          type: string
          format: date-time
        open:
          type: string
        high:
          type: string
        low:
          type: string
        close:
          type: string
        volume:
          type: string
        interval:
          type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, symbol, timestamp, open, high, low, close, volume, interval, source, createdAt]

    CandleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        total:
          type: integer
        symbol:
          type: string
        interval:
          type: string
      required: [data, total, symbol, interval]

    LatestPriceResponse:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: string
        timestamp:
          type: string
          format: date-time
        interval:
          type: string
        source:
          type: string
      required: [symbol, price, timestamp, interval, source]

    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------
    IngestionLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        symbol:
          type: string
        interval:
          type: string
        status:
          type: string
        candlesFetched:
          type: integer
          nullable: true
        candlesInserted:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        durationMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, status, createdAt]

    IngestionStatusResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IngestionLogEntry"
        total:
          type: integer
      required: [data, total]

    IngestionJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobType:
          type: string
        providerName:
          type: string
        symbol:
          type: string
          nullable: true
        interval:
          type: string
          nullable: true
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        recordsProcessed:
          type: integer
        recordsInserted:
          type: integer
        errorDetails:
          type: string
          nullable: true
        durationMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, jobType, providerName, status, startedAt, recordsProcessed, recordsInserted, createdAt]

    IngestionJobListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IngestionJob"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Providers
    # -------------------------------------------------------------------------
    Provider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        supportedTypes:
          type: string
        status:
          type: string
        baseUrl:
          type: string
          nullable: true
        requiresAuth:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, displayName, supportedTypes, status, requiresAuth, createdAt, updatedAt]

    ProviderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        total:
          type: integer
      required: [data, total]

    ProviderHealthEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        providerName:
          type: string
        status:
          type: string
        latencyMs:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
      required: [id, providerName, status, checkedAt]

    ProviderHealthListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProviderHealthEntry"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Market Registry
    # -------------------------------------------------------------------------
    MarketRegistryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        exchange:
          type: string
        active:
          type: boolean
        providerName:
          type: string
          nullable: true
        providerStatus:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          properties:
            sector:
              type: string
              nullable: true
            currency:
              type: string
              nullable: true
            timezone:
              type: string
              nullable: true
            marketCapUsd:
              type: string
              nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, symbol, name, type, exchange, active, createdAt, updatedAt]

    MarketRegistryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketRegistryEntry"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Data Quality
    # -------------------------------------------------------------------------
    DataQualityCheck:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        interval:
          type: string
        checkType:
          type: string
        status:
          type: string
        candleCount:
          type: integer
        issueCount:
          type: integer
        details:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, symbol, interval, checkType, status, candleCount, issueCount, checkedAt, createdAt]

    DataQualityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DataQualityCheck"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Economic Events
    # -------------------------------------------------------------------------
    EconomicEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        country:
          type: string
        impact:
          type: string
        eventType:
          type: string
          nullable: true
        scheduledAt:
          type: string
          format: date-time
        actualValue:
          type: string
          nullable: true
        forecastValue:
          type: string
          nullable: true
        previousValue:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, country, impact, scheduledAt, createdAt, updatedAt]

    EconomicEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EconomicEvent"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # News
    # -------------------------------------------------------------------------
    NewsItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        title:
          type: string
        category:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
        sentimentScore:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, title, publishedAt, createdAt]

    NewsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Research Laboratory (Phase 3)
    # -------------------------------------------------------------------------

    ParameterDef:
      type: object
      properties:
        type:
          type: string
          enum: [integer, float, boolean]
        default:
          oneOf:
            - type: number
            - type: boolean
        min:
          type: number
          nullable: true
        max:
          type: number
          nullable: true
        description:
          type: string
      required: [type, default, description]

    ResearchStrategy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        parameterSchema:
          type: string
          description: JSON-encoded parameter schema object
        currentVersion:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, displayName, parameterSchema, currentVersion, isActive, createdAt, updatedAt]

    ResearchStrategyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ResearchStrategy"
        total:
          type: integer
      required: [data, total]

    BacktestRequest:
      type: object
      properties:
        strategyName:
          type: string
          description: Strategy identifier (e.g. ema_crossover)
        symbol:
          type: string
          description: Market symbol (e.g. BTCUSDT)
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          minimum: 1
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
          description: Strategy-specific parameter overrides
      required: [strategyName, symbol, interval, startDate, endDate]

    BacktestJobResult:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [runId, status]

    BacktestRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        parameters:
          type: string
          description: JSON-encoded strategy parameters
        status:
          type: string
          enum: [pending, running, completed, failed]
        candlesProcessed:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, strategyName, symbol, interval, startDate, endDate, parameters, status, candlesProcessed, startedAt, createdAt]

    BacktestRunListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BacktestRun"
        total:
          type: integer
      required: [data, total]

    BacktestTrade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        backtestRunId:
          type: string
          format: uuid
        side:
          type: string
          enum: [BUY, SELL]
        entryTime:
          type: string
          format: date-time
        exitTime:
          type: string
          format: date-time
          nullable: true
        entryPrice:
          type: string
        exitPrice:
          type: string
          nullable: true
        quantity:
          type: string
        pnl:
          type: string
          nullable: true
        pnlPct:
          type: string
          nullable: true
        entrySignal:
          type: string
        exitSignal:
          type: string
          nullable: true
        candleIndexEntry:
          type: integer
        candleIndexExit:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, backtestRunId, side, entryTime, entryPrice, quantity, entrySignal, candleIndexEntry, createdAt]

    PerformanceMetrics:
      type: object
      properties:
        id:
          type: string
          format: uuid
        backtestRunId:
          type: string
          format: uuid
        totalReturnPct:
          type: string
        annualizedReturnPct:
          type: string
          nullable: true
        winRate:
          type: string
        profitFactor:
          type: string
          nullable: true
        avgWinPct:
          type: string
          nullable: true
        avgLossPct:
          type: string
          nullable: true
        maxDrawdownPct:
          type: string
        sharpeRatio:
          type: string
          nullable: true
        sortinoRatio:
          type: string
          nullable: true
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        expectancy:
          type: string
          nullable: true
        calmarRatio:
          type: string
          nullable: true
        recoveryFactor:
          type: string
          nullable: true
        ulcerIndex:
          type: string
          nullable: true
        marRatio:
          type: string
          nullable: true
        exposureTimePct:
          type: string
          nullable: true
        avgTradeDurationDays:
          type: string
          nullable: true
        ulcerPerformanceIndex:
          type: string
          nullable: true
        probabilityOfRuin:
          type: string
          nullable: true
        totalCommission:
          type: string
        totalSlippage:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, backtestRunId, totalReturnPct, winRate, maxDrawdownPct, totalTrades, winningTrades, losingTrades, totalCommission, totalSlippage, createdAt]

    BacktestDetailResponse:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PerformanceMetrics"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/BacktestTrade"
      required: [run, trades]

    ResearchResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          $ref: "#/components/schemas/PerformanceMetrics"
      required: [run, metrics]

    ResearchResultListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ResearchResult"
        total:
          type: integer
      required: [data, total]

    MetricComparison:
      type: object
      properties:
        metric:
          type: string
        label:
          type: string
        format:
          type: string
          enum: [percent, ratio, integer, decimal]
        higherIsBetter:
          type: boolean
        values:
          type: object
          additionalProperties:
            type: number
            nullable: true
        winnerId:
          type: string
          nullable: true
      required: [metric, label, format, higherIsBetter, values]

    ComparisonRunSummary:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PerformanceMetrics"
      required: [run]

    ComparisonResponse:
      type: object
      properties:
        runIds:
          type: array
          items:
            type: string
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/ComparisonRunSummary"
        comparisons:
          type: array
          items:
            $ref: "#/components/schemas/MetricComparison"
        overallWinnerId:
          type: string
          nullable: true
      required: [runIds, summaries, comparisons]

    # -------------------------------------------------------------------------
    # Phase 4 — Cost Models & Position Sizing (inline sub-schemas)
    # -------------------------------------------------------------------------
    CostModelInput:
      type: object
      properties:
        commissionType:
          type: string
          enum: [flat, percentage, maker_taker]
          default: percentage
        commissionValue:
          type: number
          minimum: 0
          default: 0
        makerFee:
          type: number
          minimum: 0
          default: 0
        takerFee:
          type: number
          minimum: 0
          default: 0
        slippageType:
          type: string
          enum: [fixed, percentage, volatility_based, volume_based]
          default: percentage
        slippageValue:
          type: number
          minimum: 0
          default: 0

    PositionSizingInput:
      type: object
      properties:
        method:
          type: string
          enum: [fixed_dollar, fixed_percentage, risk_percentage, volatility_based, kelly]
          default: fixed_percentage
        value:
          type: number
          exclusiveMinimum: 0
          default: 1.0
        maxPositionPct:
          type: number
          minimum: 0.01
          maximum: 1.0
          default: 1.0
        atrPeriod:
          type: integer
          minimum: 2
          maximum: 200
          default: 14
        atrRiskMultiple:
          type: number
          exclusiveMinimum: 0
          default: 2.0
        kellyFraction:
          type: number
          minimum: 0.01
          maximum: 1.0
          default: 0.25

    # -------------------------------------------------------------------------
    # Phase 4 — Portfolio Backtest
    # -------------------------------------------------------------------------
    PortfolioBacktestRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        strategyName:
          type: string
        symbols:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          exclusiveMinimum: 0
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
        costModel:
          $ref: "#/components/schemas/CostModelInput"
        positionSizing:
          $ref: "#/components/schemas/PositionSizingInput"
      required: [strategyName, symbols, interval, startDate, endDate]

    PortfolioBacktestJobResult:
      type: object
      properties:
        portfolioRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [portfolioRunId, status]

    SymbolResult:
      type: object
      properties:
        symbol:
          type: string
        tradeCount:
          type: integer
        finalEquity:
          type: number
        metrics:
          type: object
          description: ComputedMetrics for this symbol
      required: [symbol, tradeCount, finalEquity, metrics]

    PortfolioMetrics:
      type: object
      properties:
        totalReturnPct:
          type: number
        annualizedReturnPct:
          type: number
          nullable: true
        maxDrawdownPct:
          type: number
        sharpeRatio:
          type: number
          nullable: true
        sortinoRatio:
          type: number
          nullable: true
        calmarRatio:
          type: number
          nullable: true
        ulcerIndex:
          type: number
          nullable: true
        exposureTimePct:
          type: number
          nullable: true
        totalTrades:
          type: integer
        winRate:
          type: number
        profitFactor:
          type: number
          nullable: true
        initialCapital:
          type: number
        finalEquity:
          type: number
        totalCommission:
          type: number
        totalSlippage:
          type: number
        symbolResults:
          type: array
          items:
            $ref: "#/components/schemas/SymbolResult"
      required: [totalReturnPct, maxDrawdownPct, totalTrades, winRate, initialCapital, finalEquity, totalCommission, totalSlippage, symbolResults]

    PortfolioBacktestDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: PortfolioBacktest record
        portfolioMetrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PortfolioMetrics"
        equityCurve:
          nullable: true
          type: object
          description: Equity curve summary
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Walk-Forward
    # -------------------------------------------------------------------------
    WalkForwardRequest:
      type: object
      properties:
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          exclusiveMinimum: 0
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
        inSamplePct:
          type: number
          minimum: 0.4
          maximum: 0.95
          default: 0.7
        windowCount:
          type: integer
          minimum: 2
          maximum: 20
          default: 5
        windowType:
          type: string
          enum: [rolling, expanding]
          default: rolling
      required: [strategyName, symbol, interval, startDate, endDate]

    WalkForwardJobResult:
      type: object
      properties:
        walkForwardRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [walkForwardRunId, status]

    WalkForwardWindowResult:
      type: object
      properties:
        windowIndex:
          type: integer
        isStart:
          type: string
          format: date-time
        isEnd:
          type: string
          format: date-time
        oosStart:
          type: string
          format: date-time
        oosEnd:
          type: string
          format: date-time
        isTotalReturnPct:
          type: number
        oosTotalReturnPct:
          type: number
        isSharpe:
          type: number
          nullable: true
        oosSharpe:
          type: number
          nullable: true
        isTrades:
          type: integer
        oosTrades:
          type: integer
      required: [windowIndex, isStart, isEnd, oosStart, oosEnd, isTotalReturnPct, oosTotalReturnPct, isTrades, oosTrades]

    WalkForwardDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: WalkForwardRun record (without windowResults blob)
        windowResults:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WalkForwardWindowResult"
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Monte Carlo
    # -------------------------------------------------------------------------
    MonteCarloRequest:
      type: object
      properties:
        backtestRunId:
          type: string
          format: uuid
        simulations:
          type: integer
          minimum: 100
          maximum: 10000
          default: 1000
        seed:
          type: integer
          description: Random seed for reproducibility
        ruinThreshold:
          type: number
          minimum: 0.01
          maximum: 0.99
          default: 0.5
          description: Capital fraction below which a simulation is counted as ruin
      required: [backtestRunId]

    MonteCarloJobResult:
      type: object
      properties:
        monteCarloRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [monteCarloRunId, status]

    MonteCarloPercentiles:
      type: object
      properties:
        p5:
          type: number
        p10:
          type: number
        p25:
          type: number
        p50:
          type: number
        p75:
          type: number
        p90:
          type: number
        p95:
          type: number
      required: [p5, p10, p25, p50, p75, p90, p95]

    MonteCarloDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: MonteCarloRun record (without percentiles blob)
        percentiles:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MonteCarloPercentiles"
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Equity Curve
    # -------------------------------------------------------------------------
    EquityCurvePoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        equity:
          type: number
      required: [timestamp, equity]

    EquityCurveResponse:
      type: object
