openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.5.0
  description: QuantForge API — multi-market data platform with paper trading
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: markets
    description: Market instruments catalog
  - name: candles
    description: OHLCV candle data
  - name: providers
    description: Market data providers and health monitoring
  - name: market-registry
    description: Extended market registry with provider info
  - name: data-quality
    description: Data quality validation results
  - name: ingestion
    description: Ingestion jobs and status
  - name: economic-events
    description: Economic calendar events
  - name: news
    description: Financial news items
  - name: research
    description: Quantitative research laboratory — strategy definitions, backtesting, and performance analysis
  - name: paper
    description: Paper trading — virtual accounts, simulated orders, position tracking, and performance analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/markets:
    get:
      operationId: listMarkets
      tags: [markets]
      summary: List market instruments
      description: Returns all market instruments, optionally filtered
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [crypto, forex, stock, index, commodity]
        - name: active
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Market list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/candles:
    get:
      operationId: getCandles
      tags: [candles]
      summary: Get OHLCV candles
      description: Returns candle data for a symbol and interval
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Candle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/latest-price:
    get:
      operationId: getLatestPrice
      tags: [candles]
      summary: Get latest price for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestPriceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/ingestion/status:
    get:
      operationId: getIngestionStatus
      tags: [ingestion]
      summary: Get recent ingestion log entries (Phase 1 legacy)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ingestion log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionStatusResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/ingestion/jobs:
    get:
      operationId: listIngestionJobs
      tags: [ingestion]
      summary: List ingestion jobs
      description: Returns structured ingestion job records with start/end times and detailed status
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, success, failed, partial]
        - name: jobType
          in: query
          schema:
            type: string
            enum: [candle_backfill, candle_incremental, quality_check, provider_health]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ingestion jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all market data providers
      description: Returns all registered providers with their current status and capabilities
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, degraded, error]
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/providers/health:
    get:
      operationId: getProvidersHealth
      tags: [providers]
      summary: Get provider health records
      description: Returns time-series health check records for providers
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Provider health records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderHealthListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/market-registry:
    get:
      operationId: getMarketRegistry
      tags: [market-registry]
      summary: Full market registry with provider info
      description: Returns markets with enriched provider information and metadata
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [crypto, forex, stock, index, commodity]
        - name: active
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: provider
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Market registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketRegistryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/data-quality:
    get:
      operationId: getDataQuality
      tags: [data-quality]
      summary: Get data quality check results
      description: Returns results of automated data quality validation runs
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
        - name: interval
          in: query
          schema:
            type: string
        - name: checkType
          in: query
          schema:
            type: string
            enum:
              - missing_candles
              - timestamp_gaps
              - duplicate_candles
              - outlier_prices
              - invalid_volumes
              - future_timestamps
              - ohlc_consistency
        - name: status
          in: query
          schema:
            type: string
            enum: [pass, fail, warning]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Data quality results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataQualityListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/economic-events:
    get:
      operationId: listEconomicEvents
      tags: [economic-events]
      summary: List economic calendar events
      description: Returns economic calendar events, filterable by country, impact, and date range
      parameters:
        - name: country
          in: query
          schema:
            type: string
        - name: impact
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Economic events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EconomicEventListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/news:
    get:
      operationId: listNews
      tags: [news]
      summary: List financial news items
      description: Returns news items, filterable by source, category, and date range
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: News items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Research Laboratory (Phase 3)
  # ---------------------------------------------------------------------------

  /v1/research/strategies:
    get:
      operationId: listResearchStrategies
      tags: [research]
      summary: List available research strategies
      description: Returns all registered strategies with their parameter schemas
      responses:
        "200":
          description: Strategy list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchStrategyListResponse"

  /v1/research/backtest:
    post:
      operationId: runBacktest
      tags: [research]
      summary: Run a backtest
      description: Executes a historical backtest for the given strategy, symbol, interval, and date range
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: Backtest completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Backtest failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobResult"

  /v1/research/backtest/{id}:
    get:
      operationId: getBacktestResult
      tags: [research]
      summary: Get backtest run with results
      description: Returns the backtest run record, performance metrics, and all simulated trades
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Backtest run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/research/runs:
    get:
      operationId: listResearchRuns
      tags: [research]
      summary: List backtest runs
      description: Returns backtest runs with optional filtering
      parameters:
        - name: strategyName
          in: query
          schema:
            type: string
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Backtest run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/research/results:
    get:
      operationId: listResearchResults
      tags: [research]
      summary: List research results
      description: Returns performance metrics for completed backtest runs
      parameters:
        - name: strategyName
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResultListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/research/compare:
    get:
      operationId: compareBacktestRuns
      tags: [research]
      summary: Compare multiple backtest runs
      description: Side-by-side performance comparison of two or more backtest runs
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of backtest run IDs (minimum 2)
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComparisonResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Portfolio Backtesting
  # ---------------------------------------------------------------------------
  /v1/research/portfolio-backtest:
    post:
      operationId: runPortfolioBacktest
      tags: [research]
      summary: Run a portfolio backtest
      description: Run a strategy across multiple symbols simultaneously with portfolio-level tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioBacktestRequest"
      responses:
        "200":
          description: Portfolio backtest completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBacktestJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Portfolio backtest failed

  /v1/research/portfolio-backtest/{id}:
    get:
      operationId: getPortfolioBacktest
      tags: [research]
      summary: Get portfolio backtest result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Portfolio backtest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBacktestDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Walk-Forward Testing
  # ---------------------------------------------------------------------------
  /v1/research/walk-forward:
    post:
      operationId: runWalkForward
      tags: [research]
      summary: Run a walk-forward validation test
      description: Splits the historical window into IS/OOS sub-periods and tests consistency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkForwardRequest"
      responses:
        "200":
          description: Walk-forward test completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkForwardJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Walk-forward test failed

  /v1/research/walk-forward/{id}:
    get:
      operationId: getWalkForwardRun
      tags: [research]
      summary: Get walk-forward run result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Walk-forward run detail with all window results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkForwardDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Monte Carlo Simulation
  # ---------------------------------------------------------------------------
  /v1/research/monte-carlo:
    post:
      operationId: runMonteCarlo
      tags: [research]
      summary: Run a Monte Carlo simulation
      description: Shuffles trade sequence N times to estimate return distribution and probability of ruin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonteCarloRequest"
      responses:
        "200":
          description: Monte Carlo simulation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloJobResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "422":
          description: Simulation failed

  /v1/research/monte-carlo/{id}:
    get:
      operationId: getMonteCarloRun
      tags: [research]
      summary: Get Monte Carlo simulation result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Monte Carlo run detail with percentiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonteCarloDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Equity Curves
  # ---------------------------------------------------------------------------
  /v1/research/equity-curve/{id}:
    get:
      operationId: getEquityCurve
      tags: [research]
      summary: Get equity curve for a backtest or portfolio run
      description: |
        Returns expanded equity curve points for a run.
        Pass `?type=portfolio` query param (not in spec) to look up a portfolio backtest.
        Pass `?format=compact` query param (not in spec) for raw compact JSON.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Equity curve data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquityCurveResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Validation
  # ---------------------------------------------------------------------------
  /v1/research/validation:
    post:
      operationId: generateValidation
      tags: [research]
      summary: Generate a strategy validation report
      description: Analyses a completed backtest for overfitting, sample size, drawdown, and other red flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationRequest"
      responses:
        "200":
          description: Validation report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/research/validation/{id}:
    get:
      operationId: getValidationResult
      tags: [research]
      summary: Get validation result for a run
      description: Retrieves the most recent validation report for a backtest or walk-forward run ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Backtest run ID or walk-forward run ID
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Phase 4 — Rankings
  # ---------------------------------------------------------------------------
  /v1/research/rankings:
    get:
      operationId: getResearchRankings
      tags: [research]
      summary: Get strategy performance rankings
      description: Returns completed backtest runs ranked by Sharpe Ratio (desc), then Total Return
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Ranked research results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Phase 5 — Paper Trading
  # ---------------------------------------------------------------------------

  /v1/paper/accounts:
    post:
      operationId: createPaperAccount
      tags: [paper]
      summary: Create a virtual paper trading account
      description: Creates a new paper trading account with virtual capital. No real money involved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaperAccountRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listPaperAccounts
      tags: [paper]
      summary: List paper trading accounts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, closed]
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountListResponse"

  /v1/paper/accounts/{id}:
    get:
      operationId: getPaperAccount
      tags: [paper]
      summary: Get paper account with portfolio summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAccountDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/assign:
    post:
      operationId: assignPaperStrategy
      tags: [paper]
      summary: Assign a strategy to a paper account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignStrategyRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/pause:
    post:
      operationId: pausePaperStrategy
      tags: [paper]
      summary: Pause an active strategy assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyStatusActionRequest"
      responses:
        "200":
          description: Assignment paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Assignment not in expected state

  /v1/paper/strategies/resume:
    post:
      operationId: resumePaperStrategy
      tags: [paper]
      summary: Resume a paused strategy assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyStatusActionRequest"
      responses:
        "200":
          description: Assignment resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/strategies/assignments:
    get:
      operationId: listPaperStrategyAssignments
      tags: [paper]
      summary: List strategy assignments
      parameters:
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, disabled]
      responses:
        "200":
          description: Assignment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAssignmentListResponse"

  /v1/paper/positions:
    get:
      operationId: listPaperPositions
      tags: [paper]
      summary: List paper positions
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, all]
            default: open
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Position list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperPositionListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/orders:
    get:
      operationId: listPaperOrders
      tags: [paper]
      summary: List paper orders
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, submitted, partially_filled, filled, cancelled, rejected, expired]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperOrderListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/paper/fills:
    get:
      operationId: listPaperFills
      tags: [paper]
      summary: List paper fill records
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Fill list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperFillListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/paper/portfolio:
    get:
      operationId: getPaperPortfolio
      tags: [paper]
      summary: Get portfolio summary for a paper account
      description: Returns current account state, portfolio metrics, and open positions
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperPortfolioResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/performance:
    get:
      operationId: getPaperPerformance
      tags: [paper]
      summary: Get performance analytics for a paper account
      description: Returns time-windowed returns, risk metrics, and trade statistics
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperPerformanceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/alerts:
    get:
      operationId: listPaperAlerts
      tags: [paper]
      summary: List paper trading alerts
      parameters:
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, critical]
        - name: acknowledged
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperAlertListResponse"

  /v1/paper/snapshots:
    get:
      operationId: listPaperSnapshots
      tags: [paper]
      summary: List daily equity snapshots for a paper account
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 90
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperSnapshotListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/paper/snapshots/trigger:
    post:
      operationId: triggerPaperSnapshot
      tags: [paper]
      summary: Manually trigger a daily snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerPaperSnapshotRequest"
      responses:
        "200":
          description: Snapshot generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshot:
                    $ref: "#/components/schemas/PaperDailySnapshot"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]
      required: [error]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # -------------------------------------------------------------------------
    # Markets
    # -------------------------------------------------------------------------
    Market:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        exchange:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, symbol, name, type, exchange, active, createdAt, updatedAt]

    MarketListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Market"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Candles
    # -------------------------------------------------------------------------
    Candle:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        timestamp:
          type: string
          format: date-time
        open:
          type: string
        high:
          type: string
        low:
          type: string
        close:
          type: string
        volume:
          type: string
        interval:
          type: string
        source:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, symbol, timestamp, open, high, low, close, volume, interval, source, createdAt]

    CandleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        total:
          type: integer
        symbol:
          type: string
        interval:
          type: string
      required: [data, total, symbol, interval]

    LatestPriceResponse:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: string
        timestamp:
          type: string
          format: date-time
        interval:
          type: string
        source:
          type: string
      required: [symbol, price, timestamp, interval, source]

    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------
    IngestionLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        symbol:
          type: string
        interval:
          type: string
        status:
          type: string
        candlesFetched:
          type: integer
          nullable: true
        candlesInserted:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        durationMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, status, createdAt]

    IngestionStatusResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IngestionLogEntry"
        total:
          type: integer
      required: [data, total]

    IngestionJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobType:
          type: string
        providerName:
          type: string
        symbol:
          type: string
          nullable: true
        interval:
          type: string
          nullable: true
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        recordsProcessed:
          type: integer
        recordsInserted:
          type: integer
        errorDetails:
          type: string
          nullable: true
        durationMs:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, jobType, providerName, status, startedAt, recordsProcessed, recordsInserted, createdAt]

    IngestionJobListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IngestionJob"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Providers
    # -------------------------------------------------------------------------
    Provider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        supportedTypes:
          type: string
        status:
          type: string
        baseUrl:
          type: string
          nullable: true
        requiresAuth:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, displayName, supportedTypes, status, requiresAuth, createdAt, updatedAt]

    ProviderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        total:
          type: integer
      required: [data, total]

    ProviderHealthEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        providerName:
          type: string
        status:
          type: string
        latencyMs:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
      required: [id, providerName, status, checkedAt]

    ProviderHealthListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProviderHealthEntry"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Market Registry
    # -------------------------------------------------------------------------
    MarketRegistryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        exchange:
          type: string
        active:
          type: boolean
        providerName:
          type: string
          nullable: true
        providerStatus:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          properties:
            sector:
              type: string
              nullable: true
            currency:
              type: string
              nullable: true
            timezone:
              type: string
              nullable: true
            marketCapUsd:
              type: string
              nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, symbol, name, type, exchange, active, createdAt, updatedAt]

    MarketRegistryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MarketRegistryEntry"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Data Quality
    # -------------------------------------------------------------------------
    DataQualityCheck:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        interval:
          type: string
        checkType:
          type: string
        status:
          type: string
        candleCount:
          type: integer
        issueCount:
          type: integer
        details:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, symbol, interval, checkType, status, candleCount, issueCount, checkedAt, createdAt]

    DataQualityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DataQualityCheck"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Economic Events
    # -------------------------------------------------------------------------
    EconomicEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        country:
          type: string
        impact:
          type: string
        eventType:
          type: string
          nullable: true
        scheduledAt:
          type: string
          format: date-time
        actualValue:
          type: string
          nullable: true
        forecastValue:
          type: string
          nullable: true
        previousValue:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, country, impact, scheduledAt, createdAt, updatedAt]

    EconomicEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EconomicEvent"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # News
    # -------------------------------------------------------------------------
    NewsItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        title:
          type: string
        category:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
        sentimentScore:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, title, publishedAt, createdAt]

    NewsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NewsItem"
        total:
          type: integer
      required: [data, total]

    # -------------------------------------------------------------------------
    # Research Laboratory (Phase 3)
    # -------------------------------------------------------------------------

    ParameterDef:
      type: object
      properties:
        type:
          type: string
          enum: [integer, float, boolean]
        default:
          oneOf:
            - type: number
            - type: boolean
        min:
          type: number
          nullable: true
        max:
          type: number
          nullable: true
        description:
          type: string
      required: [type, default, description]

    ResearchStrategy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        parameterSchema:
          type: string
          description: JSON-encoded parameter schema object
        currentVersion:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, displayName, parameterSchema, currentVersion, isActive, createdAt, updatedAt]

    ResearchStrategyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ResearchStrategy"
        total:
          type: integer
      required: [data, total]

    BacktestRequest:
      type: object
      properties:
        strategyName:
          type: string
          description: Strategy identifier (e.g. ema_crossover)
        symbol:
          type: string
          description: Market symbol (e.g. BTCUSDT)
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          minimum: 1
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
          description: Strategy-specific parameter overrides
      required: [strategyName, symbol, interval, startDate, endDate]

    BacktestJobResult:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [runId, status]

    BacktestRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        parameters:
          type: string
          description: JSON-encoded strategy parameters
        status:
          type: string
          enum: [pending, running, completed, failed]
        candlesProcessed:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, strategyName, symbol, interval, startDate, endDate, parameters, status, candlesProcessed, startedAt, createdAt]

    BacktestRunListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BacktestRun"
        total:
          type: integer
      required: [data, total]

    BacktestTrade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        backtestRunId:
          type: string
          format: uuid
        side:
          type: string
          enum: [BUY, SELL]
        entryTime:
          type: string
          format: date-time
        exitTime:
          type: string
          format: date-time
          nullable: true
        entryPrice:
          type: string
        exitPrice:
          type: string
          nullable: true
        quantity:
          type: string
        pnl:
          type: string
          nullable: true
        pnlPct:
          type: string
          nullable: true
        entrySignal:
          type: string
        exitSignal:
          type: string
          nullable: true
        candleIndexEntry:
          type: integer
        candleIndexExit:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, backtestRunId, side, entryTime, entryPrice, quantity, entrySignal, candleIndexEntry, createdAt]

    PerformanceMetrics:
      type: object
      properties:
        id:
          type: string
          format: uuid
        backtestRunId:
          type: string
          format: uuid
        totalReturnPct:
          type: string
        annualizedReturnPct:
          type: string
          nullable: true
        winRate:
          type: string
        profitFactor:
          type: string
          nullable: true
        avgWinPct:
          type: string
          nullable: true
        avgLossPct:
          type: string
          nullable: true
        maxDrawdownPct:
          type: string
        sharpeRatio:
          type: string
          nullable: true
        sortinoRatio:
          type: string
          nullable: true
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        expectancy:
          type: string
          nullable: true
        calmarRatio:
          type: string
          nullable: true
        recoveryFactor:
          type: string
          nullable: true
        ulcerIndex:
          type: string
          nullable: true
        marRatio:
          type: string
          nullable: true
        exposureTimePct:
          type: string
          nullable: true
        avgTradeDurationDays:
          type: string
          nullable: true
        ulcerPerformanceIndex:
          type: string
          nullable: true
        probabilityOfRuin:
          type: string
          nullable: true
        totalCommission:
          type: string
        totalSlippage:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, backtestRunId, totalReturnPct, winRate, maxDrawdownPct, totalTrades, winningTrades, losingTrades, totalCommission, totalSlippage, createdAt]

    BacktestDetailResponse:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PerformanceMetrics"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/BacktestTrade"
      required: [run, trades]

    ResearchResult:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          $ref: "#/components/schemas/PerformanceMetrics"
      required: [run, metrics]

    ResearchResultListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ResearchResult"
        total:
          type: integer
      required: [data, total]

    MetricComparison:
      type: object
      properties:
        metric:
          type: string
        label:
          type: string
        format:
          type: string
          enum: [percent, ratio, integer, decimal]
        higherIsBetter:
          type: boolean
        values:
          type: object
          additionalProperties:
            type: number
            nullable: true
        winnerId:
          type: string
          nullable: true
      required: [metric, label, format, higherIsBetter, values]

    ComparisonRunSummary:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PerformanceMetrics"
      required: [run]

    ComparisonResponse:
      type: object
      properties:
        runIds:
          type: array
          items:
            type: string
        summaries:
          type: array
          items:
            $ref: "#/components/schemas/ComparisonRunSummary"
        comparisons:
          type: array
          items:
            $ref: "#/components/schemas/MetricComparison"
        overallWinnerId:
          type: string
          nullable: true
      required: [runIds, summaries, comparisons]

    # -------------------------------------------------------------------------
    # Phase 4 — Cost Models & Position Sizing (inline sub-schemas)
    # -------------------------------------------------------------------------
    CostModelInput:
      type: object
      properties:
        commissionType:
          type: string
          enum: [flat, percentage, maker_taker]
          default: percentage
        commissionValue:
          type: number
          minimum: 0
          default: 0
        makerFee:
          type: number
          minimum: 0
          default: 0
        takerFee:
          type: number
          minimum: 0
          default: 0
        slippageType:
          type: string
          enum: [fixed, percentage, volatility_based, volume_based]
          default: percentage
        slippageValue:
          type: number
          minimum: 0
          default: 0

    PositionSizingInput:
      type: object
      properties:
        method:
          type: string
          enum: [fixed_dollar, fixed_percentage, risk_percentage, volatility_based, kelly]
          default: fixed_percentage
        value:
          type: number
          exclusiveMinimum: 0
          default: 1.0
        maxPositionPct:
          type: number
          minimum: 0.01
          maximum: 1.0
          default: 1.0
        atrPeriod:
          type: integer
          minimum: 2
          maximum: 200
          default: 14
        atrRiskMultiple:
          type: number
          exclusiveMinimum: 0
          default: 2.0
        kellyFraction:
          type: number
          minimum: 0.01
          maximum: 1.0
          default: 0.25

    # -------------------------------------------------------------------------
    # Phase 4 — Portfolio Backtest
    # -------------------------------------------------------------------------
    PortfolioBacktestRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        strategyName:
          type: string
        symbols:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          exclusiveMinimum: 0
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
        costModel:
          $ref: "#/components/schemas/CostModelInput"
        positionSizing:
          $ref: "#/components/schemas/PositionSizingInput"
      required: [strategyName, symbols, interval, startDate, endDate]

    PortfolioBacktestJobResult:
      type: object
      properties:
        portfolioRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [portfolioRunId, status]

    SymbolResult:
      type: object
      properties:
        symbol:
          type: string
        tradeCount:
          type: integer
        finalEquity:
          type: number
        metrics:
          type: object
          description: ComputedMetrics for this symbol
      required: [symbol, tradeCount, finalEquity, metrics]

    PortfolioMetrics:
      type: object
      properties:
        totalReturnPct:
          type: number
        annualizedReturnPct:
          type: number
          nullable: true
        maxDrawdownPct:
          type: number
        sharpeRatio:
          type: number
          nullable: true
        sortinoRatio:
          type: number
          nullable: true
        calmarRatio:
          type: number
          nullable: true
        ulcerIndex:
          type: number
          nullable: true
        exposureTimePct:
          type: number
          nullable: true
        totalTrades:
          type: integer
        winRate:
          type: number
        profitFactor:
          type: number
          nullable: true
        initialCapital:
          type: number
        finalEquity:
          type: number
        totalCommission:
          type: number
        totalSlippage:
          type: number
        symbolResults:
          type: array
          items:
            $ref: "#/components/schemas/SymbolResult"
      required: [totalReturnPct, maxDrawdownPct, totalTrades, winRate, initialCapital, finalEquity, totalCommission, totalSlippage, symbolResults]

    PortfolioBacktestDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: PortfolioBacktest record
        portfolioMetrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PortfolioMetrics"
        equityCurve:
          nullable: true
          type: object
          description: Equity curve summary
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Walk-Forward
    # -------------------------------------------------------------------------
    WalkForwardRequest:
      type: object
      properties:
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        initialCapital:
          type: number
          exclusiveMinimum: 0
          default: 10000
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
        inSamplePct:
          type: number
          minimum: 0.4
          maximum: 0.95
          default: 0.7
        windowCount:
          type: integer
          minimum: 2
          maximum: 20
          default: 5
        windowType:
          type: string
          enum: [rolling, expanding]
          default: rolling
      required: [strategyName, symbol, interval, startDate, endDate]

    WalkForwardJobResult:
      type: object
      properties:
        walkForwardRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [walkForwardRunId, status]

    WalkForwardWindowResult:
      type: object
      properties:
        windowIndex:
          type: integer
        isStart:
          type: string
          format: date-time
        isEnd:
          type: string
          format: date-time
        oosStart:
          type: string
          format: date-time
        oosEnd:
          type: string
          format: date-time
        isTotalReturnPct:
          type: number
        oosTotalReturnPct:
          type: number
        isSharpe:
          type: number
          nullable: true
        oosSharpe:
          type: number
          nullable: true
        isTrades:
          type: integer
        oosTrades:
          type: integer
      required: [windowIndex, isStart, isEnd, oosStart, oosEnd, isTotalReturnPct, oosTotalReturnPct, isTrades, oosTrades]

    WalkForwardDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: WalkForwardRun record (without windowResults blob)
        windowResults:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WalkForwardWindowResult"
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Monte Carlo
    # -------------------------------------------------------------------------
    MonteCarloRequest:
      type: object
      properties:
        backtestRunId:
          type: string
          format: uuid
        simulations:
          type: integer
          minimum: 100
          maximum: 10000
          default: 1000
        seed:
          type: integer
          description: Random seed for reproducibility
        ruinThreshold:
          type: number
          minimum: 0.01
          maximum: 0.99
          default: 0.5
          description: Capital fraction below which a simulation is counted as ruin
      required: [backtestRunId]

    MonteCarloJobResult:
      type: object
      properties:
        monteCarloRunId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, failed]
        errorMessage:
          type: string
          nullable: true
      required: [monteCarloRunId, status]

    MonteCarloPercentiles:
      type: object
      properties:
        p5:
          type: number
        p10:
          type: number
        p25:
          type: number
        p50:
          type: number
        p75:
          type: number
        p90:
          type: number
        p95:
          type: number
      required: [p5, p10, p25, p50, p75, p90, p95]

    MonteCarloDetailResponse:
      type: object
      properties:
        run:
          type: object
          description: MonteCarloRun record (without percentiles blob)
        percentiles:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MonteCarloPercentiles"
      required: [run]

    # -------------------------------------------------------------------------
    # Phase 4 — Equity Curve
    # -------------------------------------------------------------------------
    EquityCurvePoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        equity:
          type: number
      required: [timestamp, equity]

    EquityCurveResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        backtestRunId:
          type: string
          format: uuid
          nullable: true
        portfolioBacktestId:
          type: string
          format: uuid
          nullable: true
        totalPoints:
          type: integer
        startEquity:
          type: string
        endEquity:
          type: string
        peakEquity:
          type: string
        maxDrawdownPct:
          type: string
        generatedAt:
          type: string
          format: date-time
        points:
          type: array
          items:
            $ref: "#/components/schemas/EquityCurvePoint"
          description: Present when format=expanded (default)
        curveData:
          type: array
          items:
            type: object
          description: Present when format=compact (raw compact points)
      required: [id, totalPoints, startEquity, endEquity, peakEquity, maxDrawdownPct, generatedAt]

    # -------------------------------------------------------------------------
    # Phase 4 — Validation
    # -------------------------------------------------------------------------
    ValidationRequest:
      type: object
      properties:
        backtestRunId:
          type: string
          format: uuid
        walkForwardRunId:
          type: string
          format: uuid
        minTradesThreshold:
          type: integer
          minimum: 5
          maximum: 1000
          default: 30
        maxDrawdownThreshold:
          type: number
          minimum: 0.05
          maximum: 1.0
          default: 0.3

    ValidationFinding:
      type: object
      properties:
        flag:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
      required: [flag, severity, message]

    ValidationDetailResponse:
      type: object
      properties:
        validation:
          type: object
          description: ValidationResult record (without findings blob)
          properties:
            id:
              type: string
              format: uuid
            backtestRunId:
              type: string
              format: uuid
              nullable: true
            portfolioBacktestId:
              type: string
              format: uuid
              nullable: true
            walkForwardRunId:
              type: string
              format: uuid
              nullable: true
            overallScore:
              type: integer
              minimum: 0
              maximum: 100
            grade:
              type: string
              enum: [A, B, C, D, F]
            overfittingFlag:
              type: boolean
            insufficientSampleFlag:
              type: boolean
            excessiveDrawdownFlag:
              type: boolean
            lowTradeCountFlag:
              type: boolean
            strategyInstabilityFlag:
              type: boolean
            recommendation:
              type: string
            generatedAt:
              type: string
              format: date-time
          required: [id, overallScore, grade, overfittingFlag, insufficientSampleFlag, excessiveDrawdownFlag, lowTradeCountFlag, strategyInstabilityFlag, recommendation, generatedAt]
        findings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFinding"
      required: [validation, findings]

    # -------------------------------------------------------------------------
    # Phase 4 — Rankings
    # -------------------------------------------------------------------------
    RankedResult:
      type: object
      properties:
        rank:
          type: integer
        run:
          $ref: "#/components/schemas/BacktestRun"
        metrics:
          $ref: "#/components/schemas/PerformanceMetrics"
      required: [rank, run, metrics]

    RankingsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RankedResult"
        total:
          type: integer
      required: [data, total]

    # =========================================================================
    # Phase 5 — Paper Trading
    # =========================================================================

    CreatePaperAccountRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Main Account
        description:
          type: string
          maxLength: 500
        initialCapital:
          type: number
          minimum: 100
          maximum: 100000000
          example: 100000
      required: [name, initialCapital]

    PaperAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        initialCapital:
          type: string
          description: Starting virtual capital (numeric string)
        currentEquity:
          type: string
        cashBalance:
          type: string
        buyingPower:
          type: string
        realizedPnl:
          type: string
        unrealizedPnl:
          type: string
        marginUsed:
          type: string
        status:
          type: string
          enum: [active, paused, closed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, initialCapital, currentEquity, cashBalance, buyingPower, realizedPnl, unrealizedPnl, marginUsed, status, createdAt, updatedAt]

    PaperPortfolio:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        openPositions:
          type: integer
        closedPositions:
          type: integer
        totalExposure:
          type: string
        allocationPct:
          type: string
        peakEquity:
          type: string
        currentDrawdownPct:
          type: string
        maxDrawdownPct:
          type: string
        dailyReturnPct:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [id, accountId, openPositions, closedPositions, totalExposure, allocationPct, peakEquity, currentDrawdownPct, maxDrawdownPct, dailyReturnPct, updatedAt]

    PaperPosition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        strategyName:
          type: string
          nullable: true
        symbol:
          type: string
        side:
          type: string
          enum: [long, short]
        status:
          type: string
          enum: [open, closed]
        quantity:
          type: string
        entryPrice:
          type: string
        currentPrice:
          type: string
        exitPrice:
          type: string
          nullable: true
        marketValue:
          type: string
        unrealizedPnl:
          type: string
        realizedPnl:
          type: string
          nullable: true
        commission:
          type: string
        slippage:
          type: string
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, accountId, symbol, side, status, quantity, entryPrice, currentPrice, marketValue, unrealizedPnl, commission, slippage, openedAt]

    PaperOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        strategyName:
          type: string
          nullable: true
        symbol:
          type: string
        orderType:
          type: string
          enum: [market, limit, stop, stop_limit]
        side:
          type: string
          enum: [buy, sell]
        quantity:
          type: string
        filledQuantity:
          type: string
        limitPrice:
          type: string
          nullable: true
        stopPrice:
          type: string
          nullable: true
        avgFillPrice:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, submitted, partially_filled, filled, cancelled, rejected, expired]
        rejectReason:
          type: string
          nullable: true
        signal:
          type: string
          nullable: true
        marketPriceAtOrder:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        filledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, accountId, symbol, orderType, side, quantity, filledQuantity, status, createdAt]

    PaperFill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        quantity:
          type: string
        rawPrice:
          type: string
        fillPrice:
          type: string
        commission:
          type: string
        slippage:
          type: string
        latencyMs:
          type: string
        filledAt:
          type: string
          format: date-time
      required: [id, orderId, accountId, symbol, side, quantity, rawPrice, fillPrice, commission, slippage, latencyMs, filledAt]

    PaperStrategyAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        params:
          type: string
          nullable: true
          description: JSON-encoded parameter overrides
        status:
          type: string
          enum: [active, paused, disabled]
        statusReason:
          type: string
          nullable: true
        assignedAt:
          type: string
          format: date-time
        pausedAt:
          type: string
          format: date-time
          nullable: true
        resumedAt:
          type: string
          format: date-time
          nullable: true
        disabledAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required: [id, accountId, strategyName, symbol, interval, status, assignedAt, updatedAt]

    PaperAlert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
          nullable: true
        alertType:
          type: string
          enum: [large_drawdown, strategy_failure, position_concentration, equity_threshold, missed_data, execution_failure]
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
        payload:
          type: string
          nullable: true
        acknowledged:
          type: boolean
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, alertType, severity, message, acknowledged, createdAt]

    PaperDailySnapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        snapshotDate:
          type: string
          format: date
        equity:
          type: string
        cashBalance:
          type: string
        positionValue:
          type: string
        dailyRealizedPnl:
          type: string
        unrealizedPnl:
          type: string
        dailyReturnPct:
          type: string
        drawdownPct:
          type: string
        openPositions:
          type: integer
        tradesClosed:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, accountId, snapshotDate, equity, cashBalance, positionValue, dailyRealizedPnl, unrealizedPnl, dailyReturnPct, drawdownPct, openPositions, tradesClosed, createdAt]

    PaperPerformanceMetrics:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
        totalReturnPct:
          type: number
        dailyReturnPct:
          type: number
        weeklyReturnPct:
          type: number
        monthlyReturnPct:
          type: number
        ytdReturnPct:
          type: number
        sharpeRatio:
          type: number
          nullable: true
        maxDrawdownPct:
          type: number
        winRate:
          type: number
        profitFactor:
          type: number
          nullable: true
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        avgTradePnl:
          type: number
        avgWinPnl:
          type: number
          nullable: true
        avgLossPnl:
          type: number
          nullable: true
        largestWin:
          type: number
        largestLoss:
          type: number
        totalRealizedPnl:
          type: number
        totalCommission:
          type: number
        totalSlippage:
          type: number
      required: [accountId, totalReturnPct, dailyReturnPct, weeklyReturnPct, monthlyReturnPct, ytdReturnPct, maxDrawdownPct, winRate, totalTrades, winningTrades, losingTrades, avgTradePnl, largestWin, largestLoss, totalRealizedPnl, totalCommission, totalSlippage]

    # --- Response wrappers ---

    PaperAccountResponse:
      type: object
      properties:
        account:
          $ref: "#/components/schemas/PaperAccount"
      required: [account]

    PaperAccountListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperAccount"
        total:
          type: integer
      required: [data, total]

    PaperAccountDetailResponse:
      type: object
      properties:
        account:
          $ref: "#/components/schemas/PaperAccount"
        portfolio:
          $ref: "#/components/schemas/PaperPortfolio"
          nullable: true
      required: [account]

    AssignStrategyRequest:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
        strategyName:
          type: string
        symbol:
          type: string
        interval:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        params:
          type: object
          additionalProperties:
            oneOf:
              - type: number
              - type: boolean
      required: [accountId, strategyName, symbol, interval]

    StrategyStatusActionRequest:
      type: object
      properties:
        assignmentId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500
      required: [assignmentId]

    StrategyAssignmentResponse:
      type: object
      properties:
        assignment:
          $ref: "#/components/schemas/PaperStrategyAssignment"
      required: [assignment]

    StrategyAssignmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperStrategyAssignment"
        total:
          type: integer
      required: [data, total]

    PaperPositionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperPosition"
        total:
          type: integer
      required: [data, total]

    PaperOrderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperOrder"
        total:
          type: integer
      required: [data, total]

    PaperFillListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperFill"
        total:
          type: integer
      required: [data, total]

    PaperPortfolioResponse:
      type: object
      properties:
        account:
          $ref: "#/components/schemas/PaperAccount"
        portfolio:
          $ref: "#/components/schemas/PaperPortfolio"
          nullable: true
        openPositions:
          type: array
          items:
            $ref: "#/components/schemas/PaperPosition"
        openPositionCount:
          type: integer
      required: [account, openPositions, openPositionCount]

    PaperPerformanceResponse:
      type: object
      properties:
        metrics:
          $ref: "#/components/schemas/PaperPerformanceMetrics"
      required: [metrics]

    PaperAlertListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperAlert"
        total:
          type: integer
      required: [data, total]

    PaperSnapshotListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaperDailySnapshot"
        total:
          type: integer
      required: [data, total]

    TriggerPaperSnapshotRequest:
      type: object
      properties:
        accountId:
          type: string
          format: uuid
      required: [accountId]
