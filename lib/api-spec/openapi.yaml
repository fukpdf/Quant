      parameters:
        - name: accountId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [open, closed] }
        - name: symbol
          in: query
          schema: { type: string }
        - name: mode
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        '200':
          description: Positions with P&L summary
          content:
